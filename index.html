<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omborxona Raqamli Tizimi</title>
    <!-- Brauzer tepasidagi iconka (Favicon) -->
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="style.css?v=11">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.js"></script>
</head>
            
<body>
    <!-- Login Screen -->
    <div id="loginScreen" style="display: flex; position: fixed; inset: 0; background: #f8fafc; z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 360px; text-align: center; border: 1px solid #e2e8f0;">
            <div style="width: 100px; height: 100px; margin: 0 auto 20px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <img src="logo.jpg" alt="Institut Logotipi" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.onerror=function(){this.parentElement.innerHTML='<i data-lucide=&quot;lock&quot; style=&quot;width: 32px; height: 32px; color: #4f46e5;&quot;></i>'; lucide.createIcons();};">
            </div>
            <h2 style="margin: 0 0 8px; color: #1e293b; font-size: 22px;">Omborxonaga Kirish</h2>
            <p style="color: #64748b; font-size: 13px; margin-bottom: 25px;">Tizimdan foydalanish uchun autentifikatsiyadan o'ting</p>
            
            <input type="text" id="usernameInput" placeholder="Login" style="width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.2s;" onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#cbd5e1'">
            <input type="password" id="passwordInput" placeholder="Parol" style="width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.2s;" onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#cbd5e1'" onkeydown="if(event.key === 'Enter') handleLogin()">
            
            <button onclick="handleLogin()" style="width: 100%; padding: 14px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);">Tizimga Kirish</button>
            <p id="loginError" style="color: #ef4444; margin-top: 15px; display: none; font-size: 13px; font-weight: 600;">Xatolik: Login yoki parol noto'g'ri!</p>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container" id="mainApp" style="display: none;">

        <!-- Top Control Panel -->
        <div class="dashboard-header-card">
            <div class="header-hero">
                <img src="hero.png" alt="Warehouse Hero" class="hero-image">
                <div class="header-text-part">
                    <div class="card-title">
                        <i data-lucide="database" class="title-icon"></i>
                        <h2>Raqamli Omborxona Tizimi</h2>
                    </div>
                </div>
            </div>

            <div class="card-controls" style="flex-wrap: wrap; gap: 15px;">
                <div id="sheetTabsContainer" class="tabs-container">
                    <!-- JS da tugmalar yaratiladi -->
                </div>

                <div class="filter-group">
                    <select id="categoryFilter" class="custom-select">
                        <option value="all">Barcha guruhlar</option>
                        <!-- Options generated by JS -->
                    </select>
                </div>
                
                <button id="generateReportBtn" class="report-btn">
                    <i data-lucide="bot"></i> AI Xisobot
                </button>
                
                <button onclick="logout()" class="report-btn" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2);">
                    <i data-lucide="log-out"></i> Chiqish
                </button>

                <div class="stats-group">
                    <div class="stat-box blue-box">
                        <span class="stat-label">JAMI SONI</span>
                        <div class="stat-value" id="totalCount">0 dona</div>
                    </div>
                    <div class="stat-box green-box">
                        <span class="stat-label">JAMI QIYMATI</span>
                        <div class="stat-value" id="totalValue">0 so'm</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table Container -->
        <div class="table-container">
            <div id="loading" style="padding: 40px; text-align: center; font-weight: 700; color: #64748b;">
                <i data-lucide="loader-2" class="animate-spin"
                    style="margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; width: 32px; height: 32px;"></i>
                Ma'lumotlar Google Sheetdan yuklanmoqda...
            </div>
            <table id="mainTable">
                <!-- Bu barcha tarkib dashboard.js tomonidan dinamik yaratiladi -->
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </div>

    <!-- Mas'ul Shaxs Modali -->
    <div id="personModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="close-btn" onclick="closePersonModal()"><i data-lucide="x"></i></button>
            <div class="modal-body">
                <div class="carousel-container" id="modalCarousel">
                    <div class="carousel-slides" id="carouselSlides">
                        <!-- Slides dynamically generated by JS -->
                    </div>
                    <button class="carousel-nav prev" onclick="moveCarousel(-1)"><i data-lucide="chevron-left"></i></button>
                    <button class="carousel-nav next" onclick="moveCarousel(1)"><i data-lucide="chevron-right"></i></button>
                    <div class="carousel-counter" id="carouselCounter">1 / 1</div>
                </div>
                <h3 id="modalName">Ism Familiya</h3>
                <div class="person-details">
                    <p><i data-lucide="phone"></i> <span>Tel:</span> <strong id="modalPhone"></strong></p>
                </div>
                <div id="modalBioBox" style="margin-top: 15px; background: #f8fafc; padding: 12px; border-radius: 8px; font-size: 14px; color: #475569; text-align: left; display: none;">
                    <i data-lucide="info" style="width: 16px; height: 16px; color: #3b82f6; vertical-align: middle; margin-right: 5px;"></i>
                    <span id="modalBio"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Xisobot Modali -->
    <div id="aiModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 800px; max-width: 95vw;">
            <button class="close-btn" onclick="closeAiModal()"><i data-lucide="x"></i></button>
            <div class="modal-body">
                <h3 style="display:flex; align-items:center; justify-content:center; gap:8px; font-size:20px; color:#1e293b; margin-bottom: 15px;">
                    <i data-lucide="sparkles" style="color: #8b5cf6;"></i> Aqlli Tahlil va Xisobot
                </h3>
                <div id="aiReportContainer" class="ai-report-content">
                     <!-- Report qismi avtomatik js tomondan to'ldiriladi -->
                </div>
            </div>
        </div>
    </div>

    </div>

    <!-- <script src="data.js"></script> -->
    <script src="dashboard.js?v=10"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
