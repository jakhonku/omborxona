<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omborxona Raqamli Tizimi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.js"></script>
</head>
<body>
    <div class="main-container">
        
        <!-- Top Control Panel -->
        <div class="dashboard-header-card">
            <div class="header-hero">
                <img src="hero.png" alt="Warehouse Hero" class="hero-image">
                <div class="header-text-part">
                    <div class="card-title">
                        <i data-lucide="database" class="title-icon"></i>
                        <h2>Raqamli Omborxona Tizimi</h2>
                    </div>
                </div>
            </div>
            
            <div class="card-controls">
                <div class="filter-group">
                    <select id="categoryFilter" class="custom-select">
                        <option value="all">Barcha guruhlar</option>
                        <!-- Options generated by JS -->
                    </select>
                </div>
                
                <div class="stats-group">
                    <div class="stat-box blue-box">
                        <span class="stat-label">JAMI SONI</span>
                        <div class="stat-value" id="totalCount">0 dona</div>
                    </div>
                    <div class="stat-box green-box">
                        <span class="stat-label">JAMI QIYMATI</span>
                        <div class="stat-value" id="totalValue">0 so'm</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table Container -->
        <div class="table-container">
            <div id="loading" style="padding: 40px; text-align: center; font-weight: 700; color: #64748b;">
                <i data-lucide="loader-2" class="animate-spin" style="margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; width: 32px; height: 32px;"></i>
                Ma'lumotlar Google Sheetdan yuklanmoqda...
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width: 50px;">N</th>
                        <th style="text-align: left;">NOMI</th>
                        <th style="width: 15%;">INV NUMBER</th>
                        <th style="width: 80px;">SONI</th>
                        <th style="width: 15%;">SUMMA (SO'M)</th>
                        <th style="width: 15%;">PARAMETRLAR</th>
                        <th style="width: 12%;">MAS'UL SHAXS</th>
                        <th style="width: 10%;">KABINET</th>
                        <th style="width: 10%;">HOLAT</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be rendered here via JS -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- <script src="data.js"></script> -->
    <script src="dashboard.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
